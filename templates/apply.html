<!DOCTYPE html>
<html>
<head>
    <title>Apply Hostel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div style="position: absolute; top: 15px; right: 25px;">
        {% if session.get('role') == 'admin' %}
            <a href="{{ url_for('admin_dashboard') }}" 
               style="background-color: #2c3e50; color: white; padding: 8px 15px; border-radius: 8px; text-decoration: none;">
               Admin Dashboard
            </a>
        {% else %}
            <a href="{{ url_for('login') }}" 
               style="background-color: #2c3e50; color: white; padding: 8px 15px; border-radius: 8px; text-decoration: none;">
               Admin Login
            </a>
        {% endif %}
    </div>

    <div class="container">
        <h1>Apply for Hostel in {{ location }}</h1>

        <form method="POST">
            <label>Hostel Name:</label>
            <select name="hostel_name" required>
                {% for h in hostels %}
                    <option value="{{ h.name }}">{{ h.name }} - {{ h.price }}</option>
                {% endfor %}
            </select>

            <label>Room Type:</label>
            <select name="room_type" required>
                <option>Single</option>
                <option>Double</option>
                <option>Triple</option>
            </select>

            <!-- 📱 Added Phone Number field -->
            <label>Phone Number:</label>
            <input type="tel" name="phone" placeholder="Enter your phone number" 
                   pattern="[0-9]{10}" title="Enter a valid 10-digit number" required>

            <label>Duration (in months):</label>
            <input type="number" name="duration" min="1" required>

            <label>Food Requirement:</label>
            <select name="food_requirement" required>
                <option>Veg</option>
                <option>Non-veg</option>
            </select>

            <button type="submit">Submit</button>
        </form>

        <a href="{{ url_for('dashboard') }}">Back to Dashboard</a>
    </div>
</body>
</html>
